<h2 class="pb-2" data-i18n="overview-title">
  {{ 'overview-title' | translate }}
</h2>

@if (loading$ | async) {
  <upd-loading-spinner></upd-loading-spinner>
} @else {
  @if (error()) {
    <div class="w-100">
      <upd-card
        [title]="'error' | translate"
        styleClass="alert alert-danger"
        role="alert"
        titleSize="h3"
      >
        <p>{{ error() }}</p>
      </upd-card>
    </div>
  } @else {
    <upd-nav-tabs [tabs]="navTabs"></upd-nav-tabs>
    @if (!((currentRoute$ | async) || '').endsWith('uxtests')) {
      <upd-date-selector></upd-date-selector>
    }
    <router-outlet></router-outlet>
  }
}
