<div class="container-fluid my-4 gx-0">
  <div class="row">
    <div class="col">
      <upd-card [title]="'Average Task Success'">
        <div class="row">
          <div class="col-6">
            <upd-apex-donut-task-success
              [title]="'Baseline'"
              [titleTooltip]="'tooltip-baseline-task-success'"
              [successRate]="(baselineTestData$ | async)?.successRate"
              [launchDate]="(baselineTestData$ | async)?.launchDate"
            ></upd-apex-donut-task-success>
          </div>
          <div class="col-6">
            <upd-apex-donut-task-success
              [title]="'Validation'"
              [titleTooltip]="'tooltip-validation-task-success'"
              [successRate]="(validationTestData$ | async)?.successRate"
              [launchDate]="(validationTestData$ | async)?.launchDate"
              [change]="taskSuccessChange$ | async"
              [showChange]="true"
            ></upd-apex-donut-task-success>
          </div>
        </div>
        <ng-container *ngIf="taskSuccessObjectiveStatus$ | async as status">
          <div class="mt-3 d-flex align-items-center justify-content-start">
            <span class="material-icons me-1" [ngClass]="objectiveStatusConfig[status].colourClass" style="font-size: 1.7em;">{{ objectiveStatusConfig[status].icon }}</span>
            <small>{{ objectiveStatusConfig[status].messageKey | translate }}</small>
          </div>
        </ng-container>
      </upd-card>
    </div>
  </div>
</div>

<ng-container *ngIf="documents$ | async as docs">
  <div *ngIf="docs.length" class="container-fluid my-4 gx-0">
    <div class="row">
      <div class="col">
        <upd-data-table-card
          [data]="docs"
          [cols]="documentsCols"
          [sort]="false"
          [pagination]="false"
          [filter]="false"
          [title]="'Documents'"
        ></upd-data-table-card>
      </div>
    </div>
  </div>
</ng-container>
