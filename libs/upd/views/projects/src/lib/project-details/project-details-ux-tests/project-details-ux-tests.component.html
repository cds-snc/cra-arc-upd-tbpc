<div class="container-fluid my-4 gx-0">
  <div class="row">
    <div class="col">
      <upd-card [title]="'Average Task Success'">
        <div class="row">
          <div class="col-6">
            <upd-card
              [title]="'Baseline'"
              [titleTooltip]="'tooltip-baseline-task-success'"
            >
              <upd-apex-donut-task-success
                [successRate]="(baselineTestData$ | async)?.successRate"
                [launchDate]="(baselineTestData$ | async)?.launchDate"
              ></upd-apex-donut-task-success>
              <ng-container *ngIf="baselineDocs$ | async as baselineDocs">
                <div *ngIf="baselineDocs.length" class="mt-2">
                  <ng-container *ngFor="let doc of baselineDocs">
                    <div *ngIf="doc.url">
                      <a [href]="doc.url" target="_blank" rel="noopener noreferrer">
                        <small>{{ doc.filename }} <i class="pi pi-external-link"></i></small>
                      </a>
                    </div>
                  </ng-container>
                </div>
              </ng-container>
            </upd-card>
          </div>
          <div class="col-6">
            <upd-card
              [title]="'Validation'"
              [titleTooltip]="'tooltip-validation-task-success'"
            >
              <upd-apex-donut-task-success
                [successRate]="(validationTestData$ | async)?.successRate"
                [launchDate]="(validationTestData$ | async)?.launchDate"
                [change]="taskSuccessChange$ | async"
                [showChange]="true"
              ></upd-apex-donut-task-success>
              <ng-container *ngIf="validationDocs$ | async as validationDocs">
                <div *ngIf="validationDocs.length" class="mt-2">
                  <ng-container *ngFor="let doc of validationDocs">
                    <div *ngIf="doc.url">
                      <a [href]="doc.url" target="_blank" rel="noopener noreferrer">
                        <small>{{ doc.filename }} <i class="pi pi-external-link"></i></small>
                      </a>
                    </div>
                  </ng-container>
                </div>
              </ng-container>
            </upd-card>
          </div>
        </div>
        <div class="mt-3 d-flex align-items-center justify-content-start">
          <span class="badge rounded-circle me-2" style="background-color: #FBC02D; width: 12px; height: 12px;">&nbsp;</span>
          <small>{{ 'task-success-objective-legend' | translate }}</small>
        </div>
      </upd-card>
    </div>
  </div>
</div>

<div class="container-fluid my-4 gx-0">
  <div class="row">
    <div class="col-lg-6 col-sm-12">
      <upd-data-card
        [current]="avgTaskSuccessFromLastTest$ | async"
        [comparison]="avgSuccessPercentChange$ | async"
        [comparisonValue]="avgSuccessValueChange$ | async"
        [title]="'Average task success from last UX test'"
        [emptyMessage]="'project-tasks-not-tested'"
        [displayKpis]="true"
        [displayComparison]="true"
        pipe="percent"
      >
        <p>
          ({{ 'Last UX test date:' | translate }}
          {{ dateFromLastTest$ | async | localeDate }})
        </p>
      </upd-data-card>
    </div>

    <div class="col-lg-6 col-sm-12">
      <upd-data-card
        [current]="totalParticipants$ | async"
        [emptyMessage]="'project-tasks-not-tested'"
        [title]="'Total participants from all tests'"
      ></upd-data-card>
    </div>
  </div>
</div>

<div class="container-fluid my-4 gx-0">
  <div class="row">
    <div class="col-lg-12">
      <upd-apex-bar
        [title]="'Tasks success by Test'"
        [series]="(apexTaskSuccessByUxTest$ | async)?.series || []"
        [yAxis]="'tasks' | translate"
        [xAxis]="(apexTaskSuccessByUxTest$ | async)?.xaxis || []"
        [height]="(taskSuccessChartHeight$ | async) || 0"
        [horizontal]="{ isHorizontal: true, colorDistributed: false }"
        [showPercent]="{
          isPercent: true,
          showTitleTooltip: true,
          showMarker: true,
          shared: true
        }"
        [table]="(taskSuccessByUxTest$ | async) || []"
        [tableCols]="taskSuccessRateCols"
        [emptyMessage]="'project-tasks-not-tested'"
      ></upd-apex-bar>
    </div>
  </div>
</div>

<div class="container-fluid my-4 gx-0">
  <div class="row">
    <div class="col">
      <upd-data-table-card
        [data]="(projectTasks$ | async) || []"
        [cols]="participantTasksCols"
        [sort]="true"
        [pagination]="false"
        [filter]="false"
        [title]="'Related tasks'"
        sortField="title"
      >
      </upd-data-table-card>
    </div>
  </div>
</div>

<ng-container *ngIf="taskSuccessByUxTestKpi$ | async as taskSuccessKpi">
  <div class="container-fluid my-4 gx-0" *ngIf="successRateCols.length">
    <div class="row">
      <div class="col">
        <upd-data-table-card
          [data]="taskSuccessKpi"
          [cols]="successRateCols"
          [sort]="true"
          [pagination]="false"
          [filter]="false"
          [kpi]="true"
          [title]="'Task success by UX test'"
          sortField="task"
        >
        </upd-data-table-card>
      </div>
    </div>
  </div>
</ng-container>

<div *ngIf="documents$ | async as documents" class="container-fluid my-4 gx-0">
  <div class="row">
    <div class="col">
      <upd-data-table-card
        [data]="documents || []"
        [cols]="documentsCols"
        [sort]="false"
        [pagination]="false"
        [filter]="false"
        [title]="'Documents'"
        [emptyStateMessage]="'project-tasks-not-tested'"
      ></upd-data-table-card>
    </div>
  </div>
</div>
