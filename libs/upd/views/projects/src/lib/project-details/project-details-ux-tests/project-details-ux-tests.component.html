<div class="container-fluid my-4 gx-0">
  <div class="row">
    <div class="col">
      <upd-card [title]="'Average Task Success'">
        <div class="row">
          <div class="col-6">
            <upd-apex-donut-task-success
              [title]="'Baseline'"
              [titleTooltip]="'tooltip-baseline-task-success'"
              [successRate]="(baselineTestData$ | async)?.successRate"
              [launchDate]="(baselineTestData$ | async)?.launchDate"
            ></upd-apex-donut-task-success>
          </div>
          <div class="col-6">
            <upd-apex-donut-task-success
              [title]="'Validation'"
              [titleTooltip]="'tooltip-validation-task-success'"
              [successRate]="(validationTestData$ | async)?.successRate"
              [launchDate]="(validationTestData$ | async)?.launchDate"
              [change]="taskSuccessChange$ | async"
              [showChange]="true"
            ></upd-apex-donut-task-success>
          </div>
        </div>
        <upd-task-success-objective-status
          [status]="taskSuccessObjectiveStatus$ | async"
        ></upd-task-success-objective-status>
      </upd-card>
    </div>
  </div>
</div>

<upd-tasks-tested
  [tasksTestedData]="tasksTestedData$ | async"
  [tasksTestedSummary]="tasksTestedSummary$ | async"
  [totalParticipants]="totalParticipants$ | async"
  [langLink]="langLink"
></upd-tasks-tested>

@if (documents$ | async; as docs) {
  @if (docs.length) {
    <div class="container-fluid my-4 gx-0">
      <div class="row">
        <div class="col">
          <upd-data-table-card
            [data]="docs"
            [cols]="documentsCols"
            [sort]="false"
            [pagination]="false"
            [filter]="false"
            [title]="'Documents'"
          ></upd-data-table-card>
        </div>
      </div>
    </div>
  }
}
