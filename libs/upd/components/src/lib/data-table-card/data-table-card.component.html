<upd-card
  [title]="title"
  [titleTooltip]="tooltip"
  [modal]="modal"
  [modalSize]="modalSize"
>
  @if (data.length === 0) {
    <p>
      <span
        [translate]="emptyStateMessage ? emptyStateMessage : 'nodata-available'"
      ></span>
    </p>
  } @else {
    <upd-data-table
      [id]="id"
      [filter]="filter"
      [filterTree]="filterTree"
      [sort]="sort"
      [pagination]="pagination"
      [data]="data"
      [cols]="cols"
      [captionTitle]="captionTitle"
      [kpi]="kpi"
      [searchFields]="
        searchFields.length > 0 ? searchFields : defaultSearchFields
      "
      [sortField]="sortField"
      [sortOrder]="sortOrder"
      [loading]="loading"
      [displayRows]="displayRows"
      [allowHeaderWrap]="allowHeaderWrap"
    ></upd-data-table>
  }
</upd-card>
