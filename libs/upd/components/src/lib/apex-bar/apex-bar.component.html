<upd-card
  [title]="title"
  [titleTooltip]="titleTooltip"
  [h]="100"
  [config]="secondaryTitleCols"
  [data]="secondaryTitleData"
>
  @if ((hasData$ | async) === false) {
    <p>
      <span [translate]="emptyMessage || ''"></span>
    </p>
  } @else {
    @if (vm$ | async; as vm) {
      <div>
        @if (hasData$ | async) {
          <apx-chart
            #chart
            [series]="vm.series || []"
            [labels]="vm.labels || []"
            [legend]="vm.legend || {}"
            [chart]="vm.chart"
            [yaxis]="vm.yaxis || []"
            [xaxis]="vm.xaxis || {}"
            [stroke]="vm.stroke || {}"
            [plotOptions]="vm.plotOptions || {}"
            [markers]="vm.markers || {}"
            [fill]="vm.fill || {}"
            [colors]="vm.colors || []"
            [dataLabels]="vm.dataLabels || {}"
            [tooltip]="vm.tooltip || {}"
            [annotations]="vm.annotations || {}"
          ></apx-chart>
        }
      </div>
    }
    @if (table) {
      <div class="pt-3">
        <upd-accordion>
          <upd-data-table
            [filter]="false"
            [sort]="false"
            [pagination]="false"
            [data]="table"
            [cols]="tableCols"
            [exports]="tableExport"
            [allowHeaderWrap]="allowHeaderWrap"
          ></upd-data-table>
        </upd-accordion>
      </div>
    }
  }
</upd-card>
