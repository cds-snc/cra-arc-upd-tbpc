@if (data.length > 0 && type === 'list') {
  <div>
    @for (d of data; track d; let i = $index) {
      @if (config.typeParams) {
        <a
          [routerLink]="[config.typeParams.preLink, d[config.typeParams.link]]"
          [queryParamsHandling]="'merge'"
          >{{ d[config.field] }}</a
        >
      }
      @if (!(i === data.length - 1)) {
        &NonBreakingSpace;/&NonBreakingSpace;
      }
    }
  </div>
}

@if (type === 'modal') {
  <div>
    <ng-container ngProjectAs="[modal]">
      <upd-modal>
        {{ modal }}
      </upd-modal>
    </ng-container>
  </div>
}
